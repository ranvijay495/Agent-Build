name: Tap listener
on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Process taps
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python listener.py
      - name: Save database
        run: |
          git config user.name "job-agent"
          git config user.email "agent@users.noreply.github.com"
          git add jobs.db
          git diff --cached --quiet || git commit -m "Apply taps [skip ci]"
          git push
